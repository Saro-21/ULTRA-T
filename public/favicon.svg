<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#000508"/>
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <text x="16" y="22" text-anchor="middle" font-size="18" fill="#00F5E0" font-family="monospace" font-weight="bold"
    filter="url(#glow)">✦</text>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#041520"/>
      <stop offset="100%" stop-color="#0A2840"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>